# docker-compose.yml（仅基础设施，不包含应用服务）
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: travel_agent
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
